<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% if csrf_token %}<meta name="csrf-token" content="{{ csrf_token }}">{% endif %}
    <title>{% block title %}WireShield{% endblock %}</title>
    {% block styles %}
    <style>
        @font-face { font-family: 'Inter'; font-weight: 400; src: url('/static/fonts/Inter-Regular.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: 'Inter'; font-weight: 600; src: url('/static/fonts/Inter-SemiBold.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: 'Inter'; font-weight: 700; src: url('/static/fonts/Inter-Bold.woff2') format('woff2'); font-display: swap; }
        @font-face { font-family: 'Inter'; font-weight: 800; src: url('/static/fonts/Inter-Black.woff2') format('woff2'); font-display: swap; }
        :root {
            /* ── Cloudflare-aligned design tokens ─────────────────────────
               Single source of truth for every page (console, auth, portal).
               Loaded first via base.html so ws-design-system.css / ws-auth.css /
               ws-portal.css all resolve the same values. */
            --ws-bg-body:        #F2F3F5;
            --ws-bg-surface:     #FFFFFF;
            --ws-bg-surface-alt: #F7F8FA;
            --ws-bg-surface-hov: #F0F1F3;

            --ws-nav-bg:         #FFFFFF;
            --ws-nav-border:     #E5E7EB;
            --ws-nav-text:       #374151;
            --ws-nav-text-hov:   #111827;
            --ws-nav-text-act:   #0055DC;
            --ws-nav-item-hov:   #F3F4F6;
            --ws-nav-item-act:   #EEF2FF;
            --ws-nav-pill-act:   #0055DC;

            --ws-border:         #E5E7EB;
            --ws-border-hov:     #D1D5DB;
            --ws-border-focus:   #0055DC;

            --ws-text-primary:   #111827;
            --ws-text-secondary: #374151;
            --ws-text-muted:     #6B7280;
            --ws-text-light:     #9CA3AF;

            --ws-blue:           #0055DC;
            --ws-blue-hov:       #0041AC;
            --ws-blue-light:     #EEF2FF;
            --ws-blue-border:    #BFCFFF;

            --ws-orange:         #F6821F;

            --ws-green:          #14804A;
            --ws-green-bg:       #EBFAF2;
            --ws-green-border:   #A8DFC1;

            --ws-amber:          #9A5B13;
            --ws-amber-bg:       #FEF5E7;
            --ws-amber-border:   #F5CC86;

            --ws-red:            #C42B1C;
            --ws-red-bg:         #FEF0EE;
            --ws-red-border:     #F5B3AD;

            --ws-gray-text:      #6B7280;
            --ws-gray-bg:        #F3F4F6;
            --ws-gray-border:    #D1D5DB;

            --ws-violet:         #6D28D9;
            --ws-violet-bg:      #EDE9FE;
            --ws-violet-border:  #C4B5FD;

            --ws-shadow-xs:    0 1px 2px 0 rgba(0,0,0,0.04);
            --ws-shadow-sm:    0 1px 3px 0 rgba(0,0,0,0.06), 0 1px 2px -1px rgba(0,0,0,0.04);
            --ws-shadow-md:    0 4px 8px -2px rgba(0,0,0,0.08), 0 2px 4px -2px rgba(0,0,0,0.04);
            --ws-shadow-lg:    0 12px 24px -4px rgba(0,0,0,0.10), 0 4px 8px -2px rgba(0,0,0,0.04);
            --ws-shadow-modal: 0 0 0 1px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.16);

            --ws-nav-width:    260px;
            --ws-header-h:     60px;

            --ws-radius-sm:    4px;
            --ws-radius-md:    6px;
            --ws-radius-lg:    8px;
            --ws-radius-xl:    12px;
            --ws-radius-2xl:   16px;
            --ws-radius-pill:  9999px;

            /* ── Legacy names kept as aliases (still read directly by some
               inline JS styles / older CSS) so nothing breaks when this
               block moved here from console.css / ws-design-system.css. */
            --bg: var(--ws-bg-body);
            --card: var(--ws-bg-surface);
            --card-alt: var(--ws-bg-surface-alt);
            --text: var(--ws-text-primary);
            --muted: var(--ws-text-muted);
            --accent: var(--ws-blue);
            --accent-hover: var(--ws-blue-hov);
            --success: var(--ws-green);
            --success-light: var(--ws-green-bg);
            --warning: var(--ws-amber);
            --error: var(--ws-red);
            --border: var(--ws-border);
            --radius: var(--ws-radius-xl);
            --text-main: var(--ws-text-primary);
            --text-muted: var(--ws-text-muted);
            --bg-body: var(--ws-bg-body);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }
        .wrapper {
            max-width: 880px;
            margin: 0 auto;
        }
        /* Shared accessibility primitives for every portal page. */
        :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        /* Inline field hint text below an input. */
        .form-hint {
            display: block;
            margin-top: 8px;
            font-size: 12px;
            color: var(--muted);
            line-height: 1.45;
            letter-spacing: normal;
            text-align: left;
        }
        /* Button loading spinner used during async submit. */
        .btn-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: ws-spin 0.7s linear infinite;
            vertical-align: -2px;
            margin-right: 8px;
        }
        @keyframes ws-spin { to { transform: rotate(360deg); } }
    </style>
    {% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
